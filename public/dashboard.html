<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpsIQ Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --jm-navy:#1B3D6E;--jm-navy-dark:#122B52;--jm-navy-light:#2B5DA6;
  --jm-red:#B02028;--jm-red-light:#D9434A;
  --jm-gold:#F0A500;--jm-gold-light:#FFD040;
  --jm-bg:#F0F2F5;--jm-surface:#FFFFFF;
  --jm-text:#1D1D1F;--jm-text-sec:#6E6E73;--jm-text-ter:#AEAEB2;
  --jm-border:#D2D2D7;--jm-border-light:#E5E5EA;
  --jm-success:#34C759;--jm-warn:#FF9500;--jm-error:#FF3B30;
  --jm-blue-tint:#EBF1FA;
  --jm-purple:#8B5CF6;
  --radius-sm:8px;--radius-md:10px;--radius-lg:14px;--radius-xl:18px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 24px rgba(0,0,0,.12);
  --glass-bg:rgba(255,255,255,.62);--glass-bg-hover:rgba(255,255,255,.82);
  --glass-blur:saturate(180%) blur(22px);
  --glass-border:rgba(0,0,0,.065);--glass-border-strong:rgba(0,0,0,.12);
  --glass-shadow:0 1px 2px rgba(0,0,0,.04),0 6px 18px rgba(0,0,0,.06);
  --glass-shadow-hover:0 2px 4px rgba(0,0,0,.06),0 12px 28px rgba(0,0,0,.10);
  --trans:all .18s ease;--sidebar-w:60px;
}
[data-theme="dark"]{
  --jm-bg:#0B1120;--jm-surface:#141B2D;--jm-text:#E2E8F0;--jm-text-sec:#94A3B8;--jm-text-ter:#64748B;
  --jm-border:#2D3748;--jm-border-light:#1E293B;--jm-blue-tint:rgba(27,61,110,.2);
  --glass-bg:rgba(255,255,255,.055);--glass-bg-hover:rgba(255,255,255,.12);
  --glass-border:rgba(255,255,255,.08);--glass-border-strong:rgba(255,255,255,.15);
}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--jm-bg);color:var(--jm-text-sec);font-size:14px;line-height:1.5;overflow-x:hidden}
a{color:inherit;text-decoration:none}button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}input,select,textarea{font-family:inherit}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes team-break-in{0%{transform:scale(.3) rotate(-10deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes team-break-out{0%{opacity:1}100%{opacity:0}}

/* Demo banner */
.demo-banner{position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,var(--jm-navy),var(--jm-navy-light));color:#fff;text-align:center;padding:5px 16px;font-size:11px;font-weight:600;z-index:300;letter-spacing:.3px}
.demo-banner button{margin-left:12px;background:rgba(255,255,255,.2);padding:2px 10px;border-radius:4px;font-size:10px;color:#fff;font-weight:600}

/* Sidebar */
.sidebar{position:fixed;top:28px;left:0;bottom:0;width:var(--sidebar-w);background:var(--jm-navy);display:flex;flex-direction:column;align-items:center;z-index:200;box-shadow:2px 0 12px rgba(0,0,0,.12);padding:14px 0 16px}
[data-theme="dark"] .sidebar{background:linear-gradient(180deg,#070D1A,#0B1120)}
.sidebar-logo{cursor:pointer;margin-bottom:16px;flex-shrink:0;color:#fff;font-size:11px;font-weight:800;letter-spacing:1.5px;text-align:center;line-height:1.2;user-select:none;transition:transform .15s}
.sidebar-logo:hover{transform:scale(1.06);opacity:.85}
.sidebar-nav{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 8px}
.sidebar-btn{position:relative;width:44px;height:44px;background:transparent;color:rgba(255,255,255,.45);cursor:pointer;border-radius:12px;transition:var(--trans);display:flex;align-items:center;justify-content:center;padding:0}
.sidebar-btn svg{width:22px;height:22px;flex-shrink:0}
.sidebar-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.9)}
.sidebar-btn.active{background:rgba(255,255,255,.15);color:#fff}
.sidebar-btn.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:24px;background:var(--jm-gold);border-radius:0 3px 3px 0}
.sidebar-badge{position:absolute;top:4px;right:4px;background:var(--jm-error);color:#fff;font-size:8px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.sidebar-divider{width:28px;height:1px;background:rgba(255,255,255,.1);margin:6px 0;flex-shrink:0}
.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 8px}

/* Content */
.content{margin-left:var(--sidebar-w);flex:1;padding:24px 28px;min-width:0;padding-top:48px}
.app{display:flex;min-height:100vh}

/* Glass card */
.card{background:var(--jm-surface);border-radius:var(--radius-lg);padding:24px;border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);margin-bottom:16px;transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:var(--glass-border-strong);box-shadow:var(--glass-shadow-hover)}
[data-theme="dark"] .card{background:var(--jm-surface);border-color:var(--jm-border-light)}
.card-title{font-size:19px;font-weight:700;color:var(--jm-navy);margin-bottom:4px;letter-spacing:-.3px}
[data-theme="dark"] .card-title{color:var(--jm-text)}
.card-sub{font-size:13px;color:var(--jm-text-sec);margin-bottom:20px}
.chart-wrap{position:relative;height:240px}

/* Glass buttons */
.glass-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;min-height:36px;font-size:13px;font-weight:700;letter-spacing:.1px;color:var(--jm-navy);background:var(--glass-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:var(--radius-md);box-shadow:var(--glass-shadow);cursor:pointer;transition:var(--trans);white-space:nowrap}
.glass-btn:hover{background:var(--glass-bg-hover);border-color:var(--glass-border-strong);box-shadow:var(--glass-shadow-hover);transform:translateY(-1px)}
.glass-btn-sm{padding:6px 12px;min-height:30px;font-size:12px;border-radius:var(--radius-sm)}
.glass-btn-primary{color:#fff;background:linear-gradient(180deg,var(--jm-navy-light),var(--jm-navy));border-color:rgba(255,255,255,.18);text-shadow:0 1px 1px rgba(0,0,0,.12)}
.glass-btn-danger{color:#fff;background:linear-gradient(180deg,var(--jm-red-light),var(--jm-red));border-color:rgba(255,255,255,.18)}
[data-theme="dark"] .glass-btn{color:#E2E8F0}

/* Page headers */
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-title{font-size:22px;font-weight:800;color:var(--jm-navy);letter-spacing:-.5px}
[data-theme="dark"] .page-title{color:var(--jm-text)}
.page-subtitle{font-size:12px;color:var(--jm-text-sec);margin-top:2px;font-weight:500}

/* Dashboard header */
.dash-header{padding:16px 0;border-bottom:2px solid var(--jm-navy);margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
[data-theme="dark"] .dash-header{border-color:var(--jm-border)}
.dash-header-title{font-size:24px;font-weight:800;color:var(--jm-navy);letter-spacing:-.5px}
[data-theme="dark"] .dash-header-title{color:var(--jm-text)}
.dash-header-sub{font-size:13px;color:var(--jm-text-sec);font-weight:500}
.dash-header-date{font-size:12px;color:var(--jm-text-ter)}

/* Filter bar (glass) */
.dash-filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:20px;padding:10px 16px;background:var(--glass-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:var(--radius-lg);box-shadow:var(--glass-shadow)}
.dash-filter-select{height:32px;padding:0 10px;border:1.5px solid var(--jm-border);border-radius:var(--radius-sm);font-size:12px;font-weight:600;background:var(--jm-surface);color:var(--jm-navy);cursor:pointer}
[data-theme="dark"] .dash-filter-select{background:var(--jm-surface);color:var(--jm-text);border-color:var(--jm-border)}
.dash-filter-select:focus{border-color:var(--jm-navy);outline:none}
.dash-preset-btn{height:28px;padding:0 10px;border:none;border-radius:6px;font-size:11px;font-weight:600;background:transparent;color:var(--jm-text-ter);cursor:pointer;transition:var(--trans)}
.dash-preset-btn:hover{color:var(--jm-navy)}
.dash-preset-btn.active{background:var(--jm-navy);color:#fff}
[data-theme="dark"] .dash-preset-btn.active{background:var(--jm-navy);color:#fff}
.dash-shift-btn{height:28px;padding:0 12px;border:1.5px solid var(--jm-border);border-radius:6px;font-size:11px;font-weight:700;background:var(--jm-surface);color:var(--jm-text-sec);cursor:pointer;transition:var(--trans)}
.dash-shift-btn.active{background:var(--jm-navy);color:#fff;border-color:var(--jm-navy)}
[data-theme="dark"] .dash-shift-btn{background:var(--jm-surface);color:var(--jm-text-sec);border-color:var(--jm-border)}
[data-theme="dark"] .dash-shift-btn.active{background:var(--jm-navy);color:#fff}

/* OEE Hero Cards */
.oee-hero-grid{display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.dash-oee-card{background:var(--jm-surface);border-radius:var(--radius-lg);padding:16px 20px;text-align:center;border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);transition:var(--trans);cursor:default}
.dash-oee-card:hover{border-color:var(--glass-border-strong);box-shadow:var(--glass-shadow-hover)}
.dash-oee-card.oee-main{background:linear-gradient(168deg,#F8FAFF,#EBF1FA);border-color:rgba(27,61,110,.15);box-shadow:0 4px 20px rgba(27,61,110,.1)}
[data-theme="dark"] .dash-oee-card{background:linear-gradient(168deg,#141B2D,#0F172A);border-color:rgba(148,163,184,.12)}
[data-theme="dark"] .dash-oee-card.oee-main{background:linear-gradient(160deg,#1E293B,#141B2D);border-color:rgba(148,163,184,.15)}
.dash-oee-label{font-size:10px;font-weight:700;color:var(--jm-text-ter);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.oee-ring{position:relative;margin:0 auto 8px}
.oee-ring svg{transform:rotate(-90deg)}
.oee-ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-weight:900;color:var(--jm-text);letter-spacing:-1px}
.dash-oee-delta{font-size:11px;font-weight:600;margin-top:4px}
.dash-oee-delta.up{color:var(--jm-success)}
.dash-oee-delta.down{color:var(--jm-error)}
.oee-sub-metrics{display:flex;justify-content:center;gap:16px;margin-top:8px;font-size:11px;font-weight:600;color:var(--jm-text-sec)}
.oee-sub-metrics span{display:flex;flex-direction:column;align-items:center;gap:1px}
.oee-sub-metrics .sub-val{font-size:14px;font-weight:800;color:var(--jm-text)}

/* Chart grid */
.chart-row{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:16px}
.chart-row.full{grid-template-columns:1fr}

/* Tables */
.dash-table{width:100%;border-collapse:collapse;font-size:12px}
.dash-table th{text-align:left;padding:10px 12px;font-size:10px;color:var(--jm-text-sec);letter-spacing:.08em;text-transform:uppercase;font-weight:700;border-bottom:2px solid var(--jm-border);background:var(--jm-bg)}
[data-theme="dark"] .dash-table th{background:#0F172A;color:var(--jm-text);border-color:var(--jm-border)}
.dash-table td{padding:10px 12px;border-bottom:1px solid var(--jm-border-light);color:var(--jm-text-sec)}
[data-theme="dark"] .dash-table td{border-color:var(--jm-border-light)}
.dash-table tr:last-child td{border-bottom:none}
.dash-table tr:hover td{background:var(--jm-blue-tint)}
[data-theme="dark"] .dash-table tr:hover td{background:rgba(27,61,110,.15)}
.oee-good{background:#DCFCE7;color:#166534;font-weight:700;border-radius:4px;padding:3px 8px;display:inline-block;font-size:11px}
.oee-warn{background:#FEF3C7;color:#92400E;font-weight:700;border-radius:4px;padding:3px 8px;display:inline-block;font-size:11px}
.oee-bad{background:#FEE2E2;color:#991B1B;font-weight:700;border-radius:4px;padding:3px 8px;display:inline-block;font-size:11px}
[data-theme="dark"] .oee-good{background:rgba(52,199,89,.15);color:#4ADE80}
[data-theme="dark"] .oee-warn{background:rgba(255,149,0,.15);color:#FBBF24}
[data-theme="dark"] .oee-bad{background:rgba(220,38,38,.18);color:#FCA5A5}
.dash-constraint{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block}
.dash-constraint.loss-a{background:rgba(255,59,48,.1);color:#dc2626}
.dash-constraint.loss-p{background:rgba(255,149,0,.1);color:#d97706}
.dash-constraint.loss-q{background:rgba(139,92,246,.1);color:#7c3aed}

/* Machine grid */
.machines-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.machine{padding:12px;border:1px solid var(--jm-border-light);border-radius:var(--radius-md);background:var(--jm-surface);transition:var(--trans)}
.machine:hover{border-color:var(--jm-navy);box-shadow:var(--shadow-sm)}
.machine-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.machine-dot.running{background:var(--jm-success);box-shadow:0 0 0 3px rgba(52,199,89,.15)}
.machine-dot.down{background:var(--jm-error);box-shadow:0 0 0 3px rgba(255,59,48,.15)}
.machine-dot.idle{background:var(--jm-warn);box-shadow:0 0 0 3px rgba(255,149,0,.15)}
.machine-name{font-size:12px;font-weight:700;color:var(--jm-text)}
.machine-stat{font-size:10px;color:var(--jm-text-ter);margin-top:4px}
.machine-oee{font-size:16px;font-weight:800;color:var(--jm-text);margin-top:6px}

/* Sub-tabs */
.sub-tabs{display:flex;gap:0;border-bottom:2px solid var(--jm-border-light);margin-bottom:20px;overflow-x:auto}
.sub-tab{padding:8px 16px;font-size:12px;font-weight:600;color:var(--jm-text-ter);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:var(--trans);white-space:nowrap}
.sub-tab:hover{color:var(--jm-text)}
.sub-tab.active{color:var(--jm-navy);border-bottom-color:var(--jm-navy);font-weight:700}
[data-theme="dark"] .sub-tab.active{color:#fff;border-bottom-color:var(--jm-gold)}

/* DT classification */
.dt-select{padding:6px 8px;border:1.5px solid var(--jm-border);border-radius:var(--radius-sm);background:var(--jm-surface);color:var(--jm-text);font-size:12px;font-family:inherit;width:100%;max-width:200px}
.dt-btn{padding:6px 14px;background:linear-gradient(180deg,var(--jm-navy-light),var(--jm-navy));color:#fff;border-radius:var(--radius-sm);font-size:11px;font-weight:700}
.dt-btn:disabled{opacity:.4;cursor:not-allowed}
.dt-badge{display:inline-block;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700}
.dt-badge.pending{background:rgba(255,149,0,.15);color:#92400E}
.dt-badge.classified{background:rgba(52,199,89,.15);color:#166534}

/* Tools grid */
.tools-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.tool-card{background:var(--jm-surface);border:1px solid var(--glass-border);padding:20px;border-radius:var(--radius-lg);cursor:pointer;transition:var(--trans);box-shadow:var(--glass-shadow)}
.tool-card:hover{transform:translateY(-2px);border-color:var(--jm-navy);box-shadow:var(--glass-shadow-hover)}
.tool-icon{width:40px;height:40px;border-radius:var(--radius-md);background:var(--jm-blue-tint);color:var(--jm-navy);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.tool-title{font-size:14px;font-weight:700;color:var(--jm-text)}
.tool-desc{font-size:12px;color:var(--jm-text-sec);margin-top:6px;line-height:1.5}

/* Settings */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--jm-border-light)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:13px;font-weight:600;color:var(--jm-text)}
.setting-desc{font-size:11px;color:var(--jm-text-sec);margin-top:2px}
.switch{position:relative;width:36px;height:20px;background:var(--jm-border);border-radius:10px;cursor:pointer;transition:background .2s}
.switch.on{background:var(--jm-success)}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}
.switch.on::after{transform:translateX(16px)}
.inline-form{display:flex;gap:8px;align-items:center;padding:10px 0;flex-wrap:wrap}
.inline-form input,.inline-form select{flex:1;min-width:100px;height:36px;padding:0 10px;border:1.5px solid var(--jm-border);border-radius:var(--radius-sm);font-size:13px;background:var(--jm-surface);color:var(--jm-text)}

/* Home page */
.home-welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 120px);text-align:center;padding:40px 20px}
.home-logo{font-size:48px;font-weight:900;color:var(--jm-navy);letter-spacing:-2px;margin-bottom:4px}
[data-theme="dark"] .home-logo{color:#fff}
.home-sub{font-size:15px;color:var(--jm-text-sec);margin-bottom:40px;font-weight:500}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:600px;width:100%}
.home-card{background:var(--glass-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:20px;padding:28px 24px;text-align:center;cursor:pointer;transition:var(--trans);box-shadow:var(--glass-shadow)}
.home-card:hover{transform:translateY(-2px);border-color:var(--glass-border-strong);box-shadow:var(--glass-shadow-hover)}
.home-card svg{width:32px;height:32px;color:var(--jm-navy);margin-bottom:12px}
[data-theme="dark"] .home-card svg{color:#93B5E8}
.home-card-title{font-size:16px;font-weight:700;color:var(--jm-text);margin-bottom:4px}
.home-card-desc{font-size:12px;color:var(--jm-text-sec);line-height:1.4}

/* TV Display */
.tv-display{max-width:1920px;margin:0 auto;display:flex;flex-direction:column;min-height:calc(100vh - 80px)}
.tv-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0;flex-wrap:wrap;gap:8px;flex-shrink:0}
.tv-header-title{font-size:18px;font-weight:800;color:var(--jm-navy);letter-spacing:-.5px}
[data-theme="dark"] .tv-header-title{color:var(--jm-text)}
.tv-header-sub{font-size:11px;color:var(--jm-text-sec);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.tv-header-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tv-range-group{display:flex;gap:2px;background:var(--jm-bg);border-radius:var(--radius-sm);padding:2px}
.tv-range-btn{height:26px;padding:0 10px;border:none;border-radius:4px;font-size:10px;font-weight:700;background:transparent;color:var(--jm-text-ter);cursor:pointer;transition:var(--trans)}
.tv-range-btn:hover{color:var(--jm-navy)}
.tv-range-btn.active{background:var(--jm-navy);color:#fff;box-shadow:0 1px 3px rgba(27,61,110,.25)}
.tv-grid{display:grid;gap:8px;flex:1;min-height:0}
.tv-equip-card{background:var(--jm-surface);border-radius:10px;box-shadow:var(--shadow-sm);overflow:hidden;display:flex;flex-direction:column}
[data-theme="dark"] .tv-equip-card{background:var(--jm-surface);border:1px solid var(--jm-border-light)}
.tv-equip-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:linear-gradient(135deg,var(--jm-navy),#2A5199);color:#fff;flex-wrap:nowrap;gap:8px;flex-shrink:0}
.tv-equip-name{display:flex;flex-direction:column;gap:1px;min-width:0;flex-shrink:1}
.tv-equip-title{font-size:14px;font-weight:700;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tv-equip-product{font-size:9px;opacity:.7;font-weight:500}
.tv-equip-operators{font-size:8px;font-weight:600;color:#bfd4f5;margin-top:2px}
.tv-oee-pills{display:flex;gap:5px;flex-shrink:0;align-items:center}
.tv-oee-pill{background:#fff;border-radius:6px;padding:2px 6px;text-align:center;min-width:40px;border-left:3px solid;box-shadow:0 1px 3px rgba(0,0,0,.08)}
[data-theme="dark"] .tv-oee-pill{background:var(--jm-surface);border-color:var(--jm-border)}
.tv-oee-pill-val{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.3px}

  else if(id==='fmea'){openModal('<div class="modal-title">FMEA</div><div class="modal-sub">RPN = S &times; O &times; D</div><table class="dash-table"><thead><tr><th>Failure Mode</th><th>S</th><th>O</th><th>D</th><th>RPN</th></tr></thead><tbody><tr><td>Blade dull (Autoshear)</td><td>6</td><td>7</td><td>3</td><td style="font-weight:800;color:#FF3B30">126</td></tr><tr><td>Hydraulic seal (400 Press)</td><td>8</td><td>5</td><td>4</td><td style="font-weight:800;color:#FF9500">160</td></tr><tr><td>Bearing wear (Threader)</td><td>7</td><td>6</td><td>5</td><td style="font-weight:800;color:#FF9500">210</td></tr><tr><td>Thread gauge drift</td><td>9</td><td>3</td><td>6</td><td style="font-weight:800;color:#FF9500">162</td></tr><tr><td>Sensor cal drift</td><td>5</td><td>4</td><td>7</td><td style="font-weight:800;color:#34C759">140</td></tr></tbody></table>');}
}

/* ══ TV DISPLAY ══ */
pageRenderers.tv=function(main){var breakMode=false;function render(){destroyCharts();var activeMachines=MACHINES.filter(function(m){return m.oee>0;});var cols=activeMachines.length<=6?2:activeMachines.length<=9?3:4;
  main.innerHTML='<div class="tv-display"><div class="tv-header"><div><div class="tv-header-title">OpsIQ &mdash; Floor Display</div><div class="tv-header-sub">Production Performance Metrics</div></div><div class="tv-header-controls"><select class="dash-filter-select" style="max-width:160px"><option>All Processes</option>'+PROCESSES.map(function(p){return'<option>'+p+'</option>';}).join('')+'</select><div class="tv-range-group"><button class="tv-range-btn active">Today</button><button class="tv-range-btn">Yesterday</button><button class="tv-range-btn">WTD</button><button class="tv-range-btn">MTD</button></div><button class="glass-btn glass-btn-sm '+(breakMode?'glass-btn-danger':'')+'" id="breakBtn">'+(breakMode?'End Team Break':'Team Break')+'</button></div></div>'+(breakMode?'<div class="team-break-overlay" id="breakOverlay"><div class="team-break-card"><div style="font-size:64px;margin-bottom:16px">&#9749;</div><div style="font-size:36px;font-weight:900;color:var(--jm-gold);letter-spacing:1px;margin-bottom:8px">TEAM BREAK</div><div style="font-size:16px;opacity:.8">All lines paused</div></div></div>':'')+'<div class="tv-grid" style="grid-template-columns:repeat('+cols+',1fr)">'+activeMachines.map(function(m){
    var gap=m.actual-m.target;var gapStr=gap>=0?'+'+gap:String(gap);var gapColor=gap>=0?'var(--jm-success)':'var(--jm-error)';var pc=function(v){return v>=80?'var(--jm-success)':v>=60?'var(--jm-warn)':'var(--jm-error)';};
    var hours=HOURLY_LABELS.map(function(l,i){var v=Math.floor(Math.random()*25)+3;var tgt=Math.round(m.target/8);var pct=Math.min(v/tgt*100,100);var cl=v>=tgt?'var(--jm-success)':'var(--jm-error)';var prev=Math.floor(Math.random()*20)+2;var prevPct=Math.min(prev/tgt*100,100);return'<div class="tv-bar-row"><div class="tv-bar-label">'+l+'</div><div class="tv-bar-track"><div class="tv-bar-prev" style="width:'+prevPct+'%"></div><div class="tv-bar-fill" style="width:'+pct+'%;background:'+cl+'"><div class="tv-bar-val">'+v+'</div></div></div></div>';}).join('');
    var dtBars=['Tooling','Changeover','Material'].map(function(c,i){var v=[12,8,4][i];return'<div class="tv-bar-row"><div class="tv-bar-label" style="width:56px">'+c+'</div><div class="tv-bar-track"><div class="tv-bar-fill" style="width:'+(v/15*100)+'%;background:var(--jm-red)"><div class="tv-bar-val">'+v+'m</div></div></div></div>';}).join('');
    var defBars=['Bent Bar','Burr'].map(function(c,i){var v=[3,1][i];return'<div class="tv-bar-row"><div class="tv-bar-label" style="width:56px">'+c+'</div><div class="tv-bar-track"><div class="tv-bar-fill" style="width:'+(v/5*100)+'%;background:var(--jm-purple)"><div class="tv-bar-val">'+v+'</div></div></div></div>';}).join('');
    return'<div class="tv-equip-card"><div class="tv-equip-header"><div class="tv-equip-name"><div class="tv-equip-title">'+m.name+'</div><div class="tv-equip-product">Running: '+m.product+'</div><div class="tv-equip-operators">'+m.operator+'</div></div><div class="tv-oee-pills"><div class="tv-oee-pill oee-hero" style="border-color:'+pc(m.oee)+'"><div class="tv-oee-pill-val" style="color:'+pc(m.oee)+'">'+m.oee.toFixed(1)+'%</div><div class="tv-oee-pill-label">OEE</div></div><div class="tv-oee-pill" style="border-color:'+pc(m.avail)+'"><div class="tv-oee-pill-val">'+m.avail.toFixed(0)+'%</div><div class="tv-oee-pill-label">A</div></div><div class="tv-oee-pill" style="border-color:'+pc(m.perf)+'"><div class="tv-oee-pill-val">'+m.perf.toFixed(0)+'%</div><div class="tv-oee-pill-label">P</div></div><div class="tv-oee-pill" style="border-color:'+pc(m.qual)+'"><div class="tv-oee-pill-val">'+m.qual.toFixed(0)+'%</div><div class="tv-oee-pill-label">Q</div></div></div></div><div class="tv-summary-row"><div class="tv-summary-stat"><span class="tv-summary-val">'+m.actual+'</span><span class="tv-summary-label">Good</span></div><div class="tv-summary-stat"><span class="tv-summary-val">'+m.target+'</span><span class="tv-summary-label">Target</span></div><div class="tv-summary-stat"><span class="tv-summary-val" style="color:'+gapColor+'">'+gapStr+'</span><span class="tv-summary-label">Gap</span></div><div class="tv-summary-stat"><span class="tv-summary-val">'+(Math.floor(Math.random()*30)+5)+'</span><span class="tv-summary-label">DT min</span></div></div><div class="tv-content-grid"><div class="tv-section"><div class="tv-section-title">Hourly Output</div>'+hours+'</div><div class="tv-section"><div class="tv-section-title">Top Downtime</div>'+dtBars+'<div class="tv-section-title" style="margin-top:6px">Top Defects</div>'+defBars+'</div></div></div>';}).join('')+'</div></div>';
  main.querySelector('#breakBtn').addEventListener('click',function(){breakMode=!breakMode;render();});}render();};

/* ══ SETTINGS ══ */
pageRenderers.settings=function(main){var STABS=['Account','Operators','Equipment','Products','DT Codes','Rates','Alerts','Display','Data'];var activeStab='Account';function render(){var s=state.settings;main.innerHTML='<div class="page-header"><div><div class="page-title">Settings</div><div class="page-subtitle">All preferences persist in your browser</div></div></div><div class="sub-tabs">'+STABS.map(function(t){return'<div class="sub-tab'+(t===activeStab?' active':'')+'" data-stab="'+t+'">'+t+'</div>';}).join('')+'</div><div id="sBox"></div>';main.querySelectorAll('.sub-tab').forEach(function(el){el.addEventListener('click',function(){activeStab=el.dataset.stab;render();});});var box=main.querySelector('#sBox');
  if(activeStab==='Account'){box.innerHTML='<div class="card"><div class="card-title">User</div><div class="card-sub">Demo account</div><div class="setting-row"><div><div class="setting-label">Signed in as</div><div class="setting-desc">demo@opsiq.local &middot; Plant Manager</div></div></div><div class="setting-row"><div><div class="setting-label">Timezone</div><div class="setting-desc">Shift boundaries</div></div><select class="dash-filter-select" id="setTz">'+['America/New_York','America/Chicago','America/Denver','America/Los_Angeles','UTC'].map(function(tz){return'<option'+(tz===s.timezone?' selected':'')+'>'+tz+'</option>';}).join('')+'</select></div></div>';box.querySelector('#setTz').addEventListener('change',function(e){state.settings.timezone=e.target.value;saveState();});}
  else if(activeStab==='Operators'){box.innerHTML='<div class="card"><div class="card-title">Operators</div><div class="card-sub">'+state.operators.length+' registered</div><table class="dash-table"><thead><tr><th>Name</th><th>Hire Date</th><th>Shift</th></tr></thead><tbody>'+state.operators.map(function(o){return'<tr><td style="font-weight:700;color:var(--jm-text)">'+o.name+'</td><td>'+o.hired+'</td><td>Shift '+o.shift+'</td></tr>';}).join('')+'</tbody></table><div class="inline-form" style="border-top:1px solid var(--jm-border-light);margin-top:8px;padding-top:12px"><input type="text" id="opN" placeholder="Last, First"><input type="date" id="opD"><select id="opS"><option>1</option><option>2</option><option>3</option></select><button class="glass-btn glass-btn-primary glass-btn-sm" id="addOp">Add</button></div></div>';box.querySelector('#addOp').addEventListener('click',function(){var n=box.querySelector('#opN').value.trim();if(n){state.operators.push({name:n,hired:box.querySelector('#opD').value||'N/A',shift:box.querySelector('#opS').value});saveState();render();}});}
  else if(activeStab==='Equipment'){box.innerHTML='<div class="card"><div class="card-title">Equipment</div><div class="card-sub">'+state.equipment.length+' units</div><table class="dash-table"><thead><tr><th>Name</th><th>Process</th><th>Status</th><th>Toggle</th></tr></thead><tbody>'+state.equipment.map(function(e,i){return'<tr><td style="font-weight:700;color:var(--jm-text)">'+e.name+'</td><td>'+e.process+'</td><td>'+(e.active?'<span class="dt-badge classified">Active</span>':'<span class="dt-badge pending">Inactive</span>')+'</td><td><div class="switch '+(e.active?'on':'')+'" data-eqi="'+i+'"></div></td></tr>';}).join('')+'</tbody></table></div>';box.querySelectorAll('.switch').forEach(function(sw){sw.addEventListener('click',function(){var i=+sw.dataset.eqi;state.equipment[i].active=!state.equipment[i].active;sw.classList.toggle('on');saveState();});});}
  else if(activeStab==='Products'){box.innerHTML='<div class="card"><div class="card-title">Products</div><div class="card-sub">'+state.products.length+' SKUs</div><table class="dash-table"><thead><tr><th>SKU</th><th>Description</th></tr></thead><tbody>'+state.products.map(function(p){return'<tr><td style="font-weight:700;color:var(--jm-text);font-family:monospace">'+p.sku+'</td><td>'+p.desc+'</td></tr>';}).join('')+'</tbody></table></div>';}
  else if(activeStab==='DT Codes'){box.innerHTML='<div class="card"><div class="card-title">Downtime Codes</div><div class="card-sub">'+DT_CATEGORIES.length+' configured</div><table class="dash-table"><thead><tr><th>#</th><th>Code</th><th>Sub-items</th></tr></thead><tbody>'+DT_CATEGORIES.map(function(c,i){return'<tr><td style="font-weight:700;color:var(--jm-text)">'+(i+1)+'</td><td>'+c+'</td><td style="font-size:11px;color:var(--jm-text-ter)">'+(DT_SUBITEMS[c]?DT_SUBITEMS[c].join(', '):'&mdash;')+'</td></tr>';}).join('')+'</tbody></table></div>';}
  else if(activeStab==='Rates'){box.innerHTML='<div class="card"><div class="card-title">Target Rates</div><div class="card-sub">Units/hr by equipment</div><table class="dash-table"><thead><tr><th>Equipment</th><th>Target</th></tr></thead><tbody>'+state.rates.map(function(r,i){return'<tr><td style="font-weight:700;color:var(--jm-text)">'+r.equip+'</td><td><input type="number" value="'+r.target+'" min="1" style="width:80px;height:32px;padding:0 8px;border:1.5px solid var(--jm-border);border-radius:var(--radius-sm);font-size:13px;font-weight:700;background:var(--jm-surface);color:var(--jm-text)" data-ri="'+i+'"></td></tr>';}).join('')+'</tbody></table></div>';box.querySelectorAll('input[data-ri]').forEach(function(inp){inp.addEventListener('change',function(){state.rates[+inp.dataset.ri].target=+inp.value;saveState();});});}
  else if(activeStab==='Alerts'){box.innerHTML='<div class="card"><div class="card-title">Alerts</div><div class="card-sub">Notifications</div><div class="setting-row"><div><div class="setting-label">Daily email digest</div><div class="setting-desc">06:15 local time</div></div><div class="switch '+(s.emailDigest?'on':'')+'" data-toggle="emailDigest"></div></div><div class="setting-row"><div><div class="setting-label">Slack OEE alerts</div><div class="setting-desc">#ops channel</div></div><div class="switch '+(s.slackAlerts?'on':'')+'" data-toggle="slackAlerts"></div></div><div class="setting-row"><div><div class="setting-label">High-downtime alert</div><div class="setting-desc">&gt;15 min single event</div></div><div class="switch '+(s.alertHighDowntime?'on':'')+'" data-toggle="alertHighDowntime"></div></div><div class="setting-row"><div><div class="setting-label">OEE threshold</div><div class="setting-desc">Alert below this %</div></div><input type="number" id="setOee" min="50" max="100" value="'+s.oeeThreshold+'" style="width:80px;height:32px;padding:0 8px;border:1.5px solid var(--jm-border);border-radius:var(--radius-sm);font-size:13px;background:var(--jm-surface);color:var(--jm-text)"></div></div>';box.querySelectorAll('[data-toggle]').forEach(function(el){el.addEventListener('click',function(){var k=el.dataset.toggle;state.settings[k]=!state.settings[k];el.classList.toggle('on',state.settings[k]);saveState();});});var oi=box.querySelector('#setOee');if(oi)oi.addEventListener('change',function(e){state.settings.oeeThreshold=+e.target.value;saveState();});}
  else if(activeStab==='Display'){box.innerHTML='<div class="card"><div class="card-title">Display</div><div class="card-sub">Appearance</div><div class="setting-row"><div><div class="setting-label">Theme</div><div class="setting-desc">Light or dark</div></div><select class="dash-filter-select" id="setTheme"><option value="light" '+(s.theme==='light'?'selected':'')+'>Light</option><option value="dark" '+(s.theme==='dark'?'selected':'')+'>Dark</option></select></div></div>';box.querySelector('#setTheme').addEventListener('change',function(e){state.settings.theme=e.target.value;document.documentElement.setAttribute('data-theme',e.target.value);saveState();navigate('settings');});}
  else if(activeStab==='Data'){box.innerHTML='<div class="card"><div class="card-title">Data</div><div class="card-sub">All data is dummy</div><div class="setting-row"><div><div class="setting-label">Reset demo</div><div class="setting-desc">Restore defaults</div></div><button class="glass-btn glass-btn-danger glass-btn-sm" id="setReset">Reset</button></div></div>';box.querySelector('#setReset').addEventListener('click',function(){if(!confirm('Reset all demo data?'))return;localStorage.removeItem(STORAGE_KEY);state=loadState();document.documentElement.setAttribute('data-theme',state.settings.theme);updatePendingBadge();navigate('settings');});}
  }render();};

document.querySelectorAll('.sidebar-btn,.sidebar-logo').forEach(function(el){el.addEventListener('click',function(){if(el.dataset.page)navigate(el.dataset.page);});});
document.getElementById('resetDemoBtn').addEventListener('click',function(){if(!confirm('Reset all demo data?'))return;localStorage.removeItem(STORAGE_KEY);state=loadState();document.documentElement.setAttribute('data-theme',state.settings.theme);updatePendingBadge();navigate('home');});
updatePendingBadge();
navigate('home');
