<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpsIQ Dashboard — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f6f7fb;--surface:#fff;--ink:#0f172a;--ink-body:#334155;--ink-muted:#64748b;--ink-light:#94a3b8;--rule:#e2e8f0;--accent:#2251FF;--accent-dark:#1a3fcc;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--navy:#051c2c;--sidebar-w:240px}
[data-theme="dark"]{--bg:#0b1220;--surface:#111a2c;--ink:#e6eaf2;--ink-body:#c5cbdb;--ink-muted:#8693ad;--ink-light:#64748b;--rule:#1e2a44;--navy:#0a2540}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink-body);font-weight:400;font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

.demo-banner{position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,#2251FF,#3d6aff);color:#fff;text-align:center;padding:6px 16px;font-size:12px;font-weight:500;z-index:100;letter-spacing:.3px}
.app{display:flex;min-height:100vh;padding-top:30px}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--rule);padding:20px 0;position:fixed;top:30px;bottom:0;left:0;overflow-y:auto;z-index:50}
.brand{padding:0 20px 20px;border-bottom:1px solid var(--rule);margin-bottom:16px}
.brand-name{font-size:18px;font-weight:700;color:var(--ink);letter-spacing:-.5px}
.brand-tag{font-size:10px;color:var(--ink-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.nav-section-title{padding:12px 20px 6px;font-size:10px;color:var(--ink-light);letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--ink-body);font-size:13px;font-weight:500;cursor:pointer;border-left:3px solid transparent;transition:background .15s,border-color .15s,color .15s}
.nav-item:hover{background:rgba(34,81,255,.05);color:var(--ink)}
.nav-item.active{background:rgba(34,81,255,.08);border-left-color:var(--accent);color:var(--accent)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;min-width:18px;text-align:center}

/* Main */
.main{flex:1;margin-left:var(--sidebar-w);padding:24px 32px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--rule);flex-wrap:wrap;gap:12px}
.page-title{font-size:22px;font-weight:700;color:var(--ink)}
.page-subtitle{font-size:12px;color:var(--ink-muted);margin-top:2px}
.header-meta{display:flex;gap:16px;align-items:center;font-size:12px;color:var(--ink-muted)}
.pulse-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:6px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Filter bar */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.filter-bar select,.filter-bar input{padding:6px 10px;border:1px solid var(--rule);border-radius:4px;background:var(--surface);color:var(--ink);font-size:12px;font-family:inherit}

/* KPI doughnut hero cards */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--rule);padding:16px;border-radius:6px;text-align:center;position:relative}
.kpi-ring-wrap{position:relative;width:100px;height:100px;margin:0 auto 8px}
.kpi-ring-wrap canvas{width:100px!important;height:100px!important}
.kpi-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:700;color:var(--ink)}
.kpi-label{font-size:10px;color:var(--ink-muted);letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.kpi-delta{font-size:11px;margin-top:4px;font-weight:500}
.kpi-delta.up{color:var(--green)}.kpi-delta.down{color:var(--red)}

/* Chart cards */
.chart-row{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:16px}
.chart-row.full{grid-template-columns:1fr}
.card{background:var(--surface);border:1px solid var(--rule);padding:16px;border-radius:6px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:var(--ink)}
.card-sub{font-size:11px;color:var(--ink-muted)}
.chart-wrap{position:relative;height:240px}

/* Machines grid */
.machines-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.machine{padding:12px;border:1px solid var(--rule);border-radius:4px;background:var(--surface)}
.machine-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.machine-dot.running{background:var(--green);box-shadow:0 0 0 3px rgba(16,185,129,.15)}
.machine-dot.down{background:var(--red);box-shadow:0 0 0 3px rgba(239,68,68,.15)}
.machine-dot.idle{background:var(--yellow);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
.machine-name{font-size:12px;font-weight:600;color:var(--ink)}
.machine-stat{font-size:10px;color:var(--ink-muted);margin-top:4px;letter-spacing:.3px}
.machine-oee{font-size:16px;font-weight:700;color:var(--ink);margin-top:6px}

/* Tables */
.table{width:100%;border-collapse:collapse;font-size:12px}
.table th{text-align:left;padding:10px 12px;font-size:10px;color:var(--ink-muted);letter-spacing:.08em;text-transform:uppercase;font-weight:600;border-bottom:1px solid var(--rule)}
.table td{padding:12px;border-bottom:1px solid var(--rule);color:var(--ink-body)}
.table tr:last-child td{border-bottom:none}

/* DT classification */
.dt-select{padding:6px 8px;border:1px solid var(--rule);border-radius:4px;background:var(--surface);color:var(--ink);font-size:12px;font-family:inherit;width:100%;max-width:200px}
.dt-btn{padding:6px 12px;background:var(--accent);color:#fff;border-radius:4px;font-size:11px;font-weight:600}
.dt-btn:disabled{opacity:.4;cursor:not-allowed}
.dt-badge{display:inline-block;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600;letter-spacing:.3px}
.dt-badge.pending{background:rgba(245,158,11,.15);color:#b45309}
.dt-badge.classified{background:rgba(16,185,129,.15);color:#047857}

/* Six sigma tools */
.tools-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.tool-card{background:var(--surface);border:1px solid var(--rule);padding:20px;border-radius:6px;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s}
.tool-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 6px 18px rgba(15,23,42,.06)}
.tool-icon{width:36px;height:36px;border-radius:6px;background:rgba(34,81,255,.1);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.tool-title{font-size:14px;font-weight:600;color:var(--ink)}
.tool-desc{font-size:12px;color:var(--ink-muted);margin-top:6px;line-height:1.5}

/* Settings */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--rule)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:13px;font-weight:500;color:var(--ink)}
.setting-desc{font-size:11px;color:var(--ink-muted);margin-top:2px}
.switch{position:relative;width:36px;height:20px;background:var(--rule);border-radius:10px;cursor:pointer;transition:background .2s}
.switch.on{background:var(--accent)}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}
.switch.on::after{transform:translateX(16px)}

/* Sub-tabs */
.sub-tabs{display:flex;gap:0;border-bottom:2px solid var(--rule);margin-bottom:20px;overflow-x:auto}
.sub-tab{padding:8px 16px;font-size:12px;font-weight:500;color:var(--ink-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;white-space:nowrap}
.sub-tab:hover{color:var(--ink)}
.sub-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* TV Display */
.tv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.tv-tile{background:var(--surface);border:1px solid var(--rule);border-radius:8px;padding:20px;text-align:center}
.tv-tile-name{font-size:16px;font-weight:700;color:var(--ink)}
.tv-tile-oee{font-size:36px;font-weight:700;margin:10px 0}
.tv-tile-status{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.1em}
.tv-tile-operator{font-size:11px;color:var(--ink-muted);margin-top:6px}
.tv-tile.running{border-left:4px solid var(--green)}
.tv-tile.running .tv-tile-oee{color:var(--green)}
.tv-tile.running .tv-tile-status{color:var(--green)}
.tv-tile.down{border-left:4px solid var(--red)}
.tv-tile.down .tv-tile-oee{color:var(--red)}
.tv-tile.down .tv-tile-status{color:var(--red)}
.tv-tile.idle{border-left:4px solid var(--yellow)}
.tv-tile.idle .tv-tile-oee{color:var(--yellow)}
.tv-tile.idle .tv-tile-status{color:var(--yellow)}
.tv-break-banner{background:var(--accent);color:#fff;text-align:center;padding:20px;border-radius:8px;margin-bottom:20px;font-size:24px;font-weight:700;letter-spacing:.5px}

input[type="number"],input[type="text"],input[type="date"],select{padding:6px 10px;border:1px solid var(--rule);border-radius:4px;background:var(--surface);color:var(--ink);font-size:12px;font-family:inherit}
.btn{padding:8px 16px;background:var(--accent);color:#fff;border-radius:4px;font-size:12px;font-weight:600;transition:background .15s}
.btn:hover{background:var(--accent-dark)}
.btn.secondary{background:transparent;color:var(--ink);border:1px solid var(--rule)}
.btn.danger{background:var(--red)}
.btn.sm{padding:4px 10px;font-size:11px}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface);border-radius:8px;width:100%;max-width:620px;max-height:85vh;overflow-y:auto;padding:24px}
.modal-close{float:right;width:28px;height:28px;border-radius:4px;color:var(--ink-muted)}
.modal-close:hover{background:var(--rule)}
.modal-title{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--ink-muted);margin-bottom:16px}

.fishbone{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fishbone-group{border:1px solid var(--rule);border-radius:4px;padding:10px}
.fishbone-title{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.fishbone-group li{font-size:12px;color:var(--ink-body);margin:4px 0 4px 16px}
.whys-row{margin:8px 0}
.whys-label{font-size:11px;font-weight:700;color:var(--accent)}
.whys-text{font-size:13px;color:var(--ink-body);margin-top:2px}

.inline-form{display:flex;gap:8px;align-items:center;padding:10px 0;flex-wrap:wrap}
.inline-form input,.inline-form select{flex:1;min-width:100px}

/* Responsive */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%);transition:transform .25s}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding:16px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .chart-row{grid-template-columns:1fr}
  .machines-grid{grid-template-columns:repeat(2,1fr)}
  .tools-grid{grid-template-columns:1fr}
  .tv-grid{grid-template-columns:1fr 1fr}
  .menu-toggle{display:inline-flex!important}
}
@media(max-width:500px){.kpi-grid{grid-template-columns:1fr 1fr}.tv-grid{grid-template-columns:1fr}}
.menu-toggle{display:none;width:36px;height:36px;align-items:center;justify-content:center;border-radius:4px;margin-right:8px}
.menu-toggle:hover{background:var(--rule)}
.back-link{display:flex;align-items:center;gap:6px;padding:10px 20px;font-size:11px;color:var(--ink-muted);letter-spacing:.05em;border-top:1px solid var(--rule);margin-top:20px}
.back-link:hover{color:var(--accent)}
</style>
</head>
<body>

<div class="app">

<script>
// ======== DEMO STATE ========
const STORAGE_KEY = 'opsiq-demo-v1';
const DEFAULT_STATE = {
  settings: { theme:'light', alertHighDowntime:true, alertOEEBelow:true, oeeThreshold:75, emailDigest:true, slackAlerts:false, timezone:'America/New_York' },
  downtimeEvents: [

    {id:'dt-002',machine:'Cable 4',start:'07:15',duration:9,status:'pending',category:null,note:'Cycle-time stopped for 9 min'},
    {id:'dt-003',machine:'Shear 1',start:'08:03',duration:24,status:'pending',category:null,note:'No parts produced'},
    {id:'dt-004',machine:'Press 3',start:'09:21',duration:6,status:'pending',category:null,note:'Sensor flagged stall'},
    {id:'dt-005',machine:'Cable 2',start:'10:08',duration:12,status:'pending',category:null,note:'Intermittent vibration spike'},
    {id:'dt-006',machine:'Shear 2',start:'05:30',duration:35,status:'classified',category:'Scheduled',note:'Shift start-up calibration'},
    {id:'dt-007',machine:'Press 1',start:'04:10',duration:22,status:'classified',category:'Changeover',note:'Die change, next SKU'}
  ],
  operators: [
    {name:'Mike Torres',hired:'2019-03-15',shift:'A'},
    {name:'Sarah Chen',hired:'2020-07-01',shift:'A'},
    {name:'David Kowalski',hired:'2018-11-20',shift:'B'},
    {name:'Lisa Pham',hired:'2021-01-10',shift:'B'},
    {name:'James Wright',hired:'2017-05-04',shift:'C'}
  ],
  equipment: [

    {name:'Cable 1',active:true},{name:'Cable 2',active:true},{name:'Cable 3',active:true},{name:'Cable 4',active:true},
    {name:'Shear 1',active:true},{name:'Shear 2',active:true},{name:'Pack 1',active:true},{name:'Pack 2',active:false}
  ],
  products: [
    {sku:'BLT-6x20',desc:'6" x 20\' Bolt'},{sku:'BLT-8x24',desc:'8" x 24\' Bolt'},

    {sku:'SHR-4x8',desc:'Shear plate 4x8'}

  rates: [
    {equip:'Press 1',target:120},{equip:'Press 2',target:115},{equip:'Press 3',target:110},{equip:'Press 4',target:120},
    {equip:'Cable 1',target:90},{equip:'Cable 2',target:95},{equip:'Cable 3',target:85},{equip:'Cable 4',target:90},
    {equip:'Shear 1',target:70},{equip:'Shear 2',target:70},{equip:'Pack 1',target:50},{equip:'Pack 2',target:50}
  ],
  classificationHistory: []
};

function loadState(){
  try{ const raw=localStorage.getItem(STORAGE_KEY); if(raw){const p=JSON.parse(raw); return {...JSON.parse(JSON.stringify(DEFAULT_STATE)),...p};} }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
let state = loadState();
document.documentElement.setAttribute('data-theme', state.settings.theme);

// ======== DUMMY DATA ========
const MACHINES=[
  {name:'Press 1',status:'running',oee:82.1,actual:98,target:120,operator:'M. Torres'},
  {name:'Press 2',status:'down',oee:61.3,actual:71,target:115,operator:'S. Chen'},
  {name:'Press 3',status:'running',oee:78.5,actual:86,target:110,operator:'D. Kowalski'},
  {name:'Press 4',status:'running',oee:85.2,actual:102,target:120,operator:'L. Pham'},
  {name:'Cable 1',status:'running',oee:88.4,actual:80,target:90,operator:'J. Wright'},
  {name:'Cable 2',status:'idle',oee:72.0,actual:68,target:95,operator:'M. Torres'},
  {name:'Cable 3',status:'running',oee:79.8,actual:68,target:85,operator:'S. Chen'},
  {name:'Cable 4',status:'idle',oee:74.1,actual:67,target:90,operator:'D. Kowalski'},
  {name:'Shear 1',status:'down',oee:55.2,actual:39,target:70,operator:'L. Pham'},
  {name:'Shear 2',status:'running',oee:81.7,actual:57,target:70,operator:'J. Wright'},
  {name:'Pack 1',status:'running',oee:90.0,actual:45,target:50,operator:'M. Torres'},
  {name:'Pack 2',status:'idle',oee:0,actual:0,target:50,operator:'---'}
];
const HOURLY_LABELS=['06:00','07:00','08:00','09:00','10:00','11:00','12:00','13:00'];
const HOURLY_ACTUAL=[102,115,108,97,121,110,88,105];

function genSPCData(){
  const target=35,ucl=42,lcl=28,points=[];
  for(let i=0;i<50;i++){
    const x=+(Math.random()*60).toFixed(1);
    let y=target+(Math.random()-.5)*12;
    if(Math.random()<.08) y=target+(Math.random()>.5?1:-1)*(8+Math.random()*4);
    points.push({x,y:+y.toFixed(1)});
  }
  points.sort((a,b)=>a.x-b.x);
  return {target,ucl,lcl,points};
}

function computePlantKPIs(){
  const active=MACHINES.filter(m=>m.oee>0);
  const avg=active.reduce((s,m)=>s+m.oee,0)/active.length;
  return{oee:avg.toFixed(1),avail:(avg*1.06).toFixed(1),perf:(avg*0.98).toFixed(1),qual:Math.min(avg*1.12,99.5).toFixed(1)};
}

const pageRenderers={};
const chartInstances=[];
function destroyCharts(){ while(chartInstances.length) chartInstances.pop().destroy(); }

function navigate(pageId){
  destroyCharts();
  const main=document.getElementById('mainContent');
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===pageId));
  main.innerHTML='';
  (pageRenderers[pageId]||pageRenderers.dashboard)(main);
  document.getElementById('sidebar').classList.remove('open');
}

function chartDefaults(isDark){
  return{tick:isDark?'#8693ad':'#64748b',grid:isDark?'#1e2a44':'#e2e8f0',
    tt:{backgroundColor:isDark?'#1e2a44':'#0f172a',titleFont:{size:11},bodyFont:{size:11},padding:8,cornerRadius:4}};
}
function isDarkMode(){ return document.documentElement.getAttribute('data-theme')==='dark'; }

pageRenderers.classify = (main) => {
  function renderClassify() {
    const pending = state.downtimeEvents.filter(e=>e.status==='pending');
    const classified = state.downtimeEvents.filter(e=>e.status==='classified');
    main.innerHTML = `
      <div class="page-header"><div><div class="page-title">Classify Downtime</div><div class="page-subtitle">${pending.length} events awaiting classification</div></div></div>
      ${pending.length ? `<div class="card"><div class="card-header"><div><div class="card-title">Pending Events</div></div></div>
        <table class="table"><thead><tr><th>Machine</th><th>Start</th><th>Duration</th><th>Note</th><th>Category</th><th>Sub-item</th><th></th></tr></thead>
          <tbody>${pending.map(e=>`<tr data-id="${e.id}">
            <td style="font-weight:600;color:var(--ink)">${e.machine}</td><td>${e.start}</td><td>${e.duration} min</td><td>${e.note}</td>
            <td><select class="dt-select cat-sel"><option value="">Select&hellip;</option>${DT_CATEGORIES.map(c=>'<option>'+c+'</option>').join('')}</select></td>
            <td><select class="dt-select sub-sel" disabled><option value="">--</option></select></td>
            <td><button class="dt-btn classify-btn" disabled>Classify</button></td>
          </tr>`).join('')}</tbody></table></div>` : '<div class="card" style="text-align:center;padding:40px;color:var(--ink-muted)">All events classified!</div>'}
      <div class="card" style="margin-top:16px"><div class="card-header"><div><div class="card-title">Recently Classified</div><div class="card-sub">${classified.length} events</div></div></div>
        ${classified.length ? `<table class="table"><thead><tr><th>Machine</th><th>Start</th><th>Duration</th><th>Category</th><th>Note</th></tr></thead>
          <tbody>${classified.map(e=>'<tr><td style="font-weight:600;color:var(--ink)">'+e.machine+'</td><td>'+e.start+'</td><td>'+e.duration+' min</td><td><span class="dt-badge classified">'+e.category+'</span></td><td>'+e.note+'</td></tr>').join('')}</tbody></table>`
          : '<div style="padding:20px;text-align:center;color:var(--ink-muted);font-size:12px">No classified events yet</div>'}</div>
    `;
    // Wire category/sub dropdowns
    main.querySelectorAll('.cat-sel').forEach(sel=>{
      sel.addEventListener('change',function(){
        const row = this.closest('tr');
        const subSel = row.querySelector('.sub-sel');
        const btn = row.querySelector('.classify-btn');
        if(this.value){
          const items = DT_SUBITEMS[this.value]||[];
          subSel.innerHTML = items.map(s=>'<option>'+s+'</option>').join('');
          subSel.disabled = false;
          btn.disabled = false;
        } else { subSel.innerHTML='<option>--</option>'; subSel.disabled=true; btn.disabled=true; }
      });
    });
    main.querySelectorAll('.classify-btn').forEach(btn=>{
      btn.addEventListener('click',function(){
        const row = this.closest('tr');
        const id = row.dataset.id;
        const cat = row.querySelector('.cat-sel').value;
        const ev = state.downtimeEvents.find(e=>e.id===id);
        if(ev){ ev.status='classified'; ev.category=cat; saveState(); updatePendingBadge(); renderClassify(); }
      });
    });
  }
  renderClassify();
};

function updatePendingBadge(){
  const c = state.downtimeEvents.filter(e=>e.status==='pending').length;
  const badge = document.getElementById('pendingBadge');
  badge.textContent = c; badge.style.display = c ? '' : 'none';
}

      <div class="page-header"><div><div class="page-title">Settings</div><div class="page-subtitle">All preferences persist in your browser</div></div></div>
      <div class="sub-tabs">${STABS.map(t=>'<div class="sub-tab'+(t===activeStab?' active':'')+'" data-stab="'+t+'">'+t+'</div>').join('')}</div>
      <div id="settingsContent"></div>
    `;
    main.querySelectorAll('.sub-tab').forEach(el=>el.addEventListener('click',()=>{activeStab=el.dataset.stab;renderSettings();}));
    const box = main.querySelector('#settingsContent');

    if (activeStab === 'Account') {
      box.innerHTML = `<div class="card"><div class="card-header"><div><div class="card-title">User</div><div class="card-sub">Demo account</div></div></div>
        <div class="setting-row"><div><div class="setting-label">Signed in as</div><div class="setting-desc">demo@opsiq.local &middot; Plant Manager &middot; Demo Plant</div></div></div>
        <div class="setting-row"><div><div class="setting-label">Timezone</div><div class="setting-desc">Used for shift boundaries and email digest</div></div>
          <select id="set-tz">${['America/New_York','America/Chicago','America/Denver','America/Los_Angeles','UTC'].map(tz=>'<option'+(tz===s.timezone?' selected':'')+'>'+tz+'</option>').join('')}</select>
        </div></div>`;
      box.querySelector('#set-tz').addEventListener('change',e=>{state.settings.timezone=e.target.value;saveState();});
    } else if (activeStab === 'Operators') {
      box.innerHTML = `<div class="card"><div class="card-header"><div><div class="card-title">Operators</div><div class="card-sub">${state.operators.length} registered</div></div></div>
        <table class="table"><thead><tr><th>Name</th><th>Hire Date</th><th>Shift</th></tr></thead><tbody>
        ${state.operators.map(o=>'<tr><td style="font-weight:600;color:var(--ink)">'+o.name+'</td><td>'+o.hired+'</td><td>'+o.shift+'</td></tr>').join('')}</tbody></table>
        <div class="inline-form" style="border-top:1px solid var(--rule);margin-top:8px;padding-top:12px">
          <input type="text" id="opName" placeholder="Name">
          <input type="date" id="opDate">
          <select id="opShift"><option>A</option><option>B</option><option>C</option></select>
          <button class="btn sm" id="addOp">Add</button>
        </div></div>`;
      box.querySelector('#addOp').addEventListener('click',()=>{
        const n=box.querySelector('#opName').value.trim(),dt=box.querySelector('#opDate').value,sh=box.querySelector('#opShift').value;
        if(n){state.operators.push({name:n,hired:dt||'N/A',shift:sh});saveState();renderSettings();}
      });
    } else if (activeStab === 'Equipment') {
      box.innerHTML = `<div class="card"><div class="card-header"><div><div class="card-title">Equipment</div><div class="card-sub">${state.equipment.length} units</div></div></div>
        <table class="table"><thead><tr><th>Name</th><th>Status</th><th>Toggle</th></tr></thead><tbody>
        ${state.equipment.map((e,i)=>'<tr><td style="font-weight:600;color:var(--ink)">'+e.name+'</td><td>'+(e.active?'<span class="dt-badge classified">Active</span>':'<span class="dt-badge pending">Inactive</span>')+'</td><td><div class="switch '+(e.active?'on':'')+'" data-eqi="'+i+'"></div></td></tr>').join('')}</tbody></table></div>`;
      box.querySelectorAll('.switch').forEach(sw=>{
        sw.addEventListener('click',()=>{const i=+sw.dataset.eqi;state.equipment[i].active=!state.equipment[i].active;sw.classList.toggle('on');saveState();});
      });
    } else if (activeStab === 'Products') {
      box.innerHTML = `<div class="card"><div class="card-header"><div><div class="card-title">Products</div><div class="card-sub">${state.products.length} SKUs</div></div></div>
        <table class="table"><thead><tr><th>SKU</th><th>Description</th></tr></thead><tbody>
        ${state.products.map(p=>'<tr><td style="font-weight:600;color:var(--ink)">'+p.sku+'</td><td>'+p.desc+'</td></tr>').join('')}</tbody></table></div>`;
    } else if (activeStab === 'Rates') {
      box.innerHTML = `<div class="card"><div class="card-header"><div><div class="card-title">Target Rates</div><div class="card-sub">Units per hour by equipment</div></div></div>
        <table class="table"><thead><tr><th>Equipment</th><th>Target (units/hr)</th></tr></thead><tbody>
        ${state.rates.map((r,i)=>'<tr><td style="font-weight:600;color:var(--ink)">'+r.equip+'</td><td><input type="number" value="'+r.target+'" min="1" style="width:80px" data-ri="'+i+'"></td></tr>').join('')}</tbody></table></div>`;
      box.querySelectorAll('input[data-ri]').forEach(inp=>{
        inp.addEventListener('change',()=>{state.rates[+inp.dataset.ri].target=+inp.value;saveState();});
      });
    } else if (activeStab === 'Alerts') {
      box.innerHTML = `<div class="card"><div class="card-header"><div><div class="card-title">Alerts</div><div class="card-sub">Automated notifications</div></div></div>
        <div class="setting-row"><div><div class="setting-label">Daily email digest</div><div class="setting-desc">06:15 local time, with the snapshot image</div></div><div class="switch ${s.emailDigest?'on':''}" data-toggle="emailDigest"></div></div>
        <div class="setting-row"><div><div class="setting-label">Slack OEE alerts</div><div class="setting-desc">Ping #ops when OEE drops below threshold</div></div><div class="switch ${s.slackAlerts?'on':''}" data-toggle="slackAlerts"></div></div>
        <div class="setting-row"><div><div class="setting-label">High-downtime alert</div><div class="setting-desc">Trigger when a single event exceeds 15 min</div></div><div class="switch ${s.alertHighDowntime?'on':''}" data-toggle="alertHighDowntime"></div></div>
        <div class="setting-row"><div><div class="setting-label">OEE alert threshold</div><div class="setting-desc">Notify when plant OEE drops below this %</div></div><input type="number" id="set-oee" min="50" max="100" value="${s.oeeThreshold}" style="width:80px"></div>
      </div>`;
      box.querySelectorAll('[data-toggle]').forEach(el=>{el.addEventListener('click',()=>{const k=el.dataset.toggle;state.settings[k]=!state.settings[k];el.classList.toggle('on',state.settings[k]);saveState();});});
      box.querySelector('#set-oee').addEventListener('change',e=>{state.settings.oeeThreshold=+e.target.value;saveState();});
    } else if (activeStab === 'Display') {
      box.innerHTML = `<div class="card"><div class="card-header"><div><div class="card-title">Display</div><div class="card-sub">Appearance</div></div></div>
        <div class="setting-row"><div><div class="setting-label">Theme</div><div class="setting-desc">Light or dark mode</div></div>
          <select id="set-theme"><option value="light" ${s.theme==='light'?'selected':''}>Light</option><option value="dark" ${s.theme==='dark'?'selected':''}>Dark</option></select>
        </div></div>`;
      box.querySelector('#set-theme').addEventListener('change',e=>{state.settings.theme=e.target.value;document.documentElement.setAttribute('data-theme',e.target.value);saveState();navigate('settings');});
    } else if (activeStab === 'Data') {
      box.innerHTML = `<div class="card"><div class="card-header"><div><div class="card-title">Data</div><div class="card-sub">All data is dummy; no remote backend</div></div></div>
        <div class="setting-row"><div><div class="setting-label">Reset demo to defaults</div><div class="setting-desc">Clears classifications and restores pending events</div></div>
          <button class="btn danger" id="set-reset">Reset</button></div></div>`;
      box.querySelector('#set-reset').addEventListener('click',()=>{
        if(!confirm('Reset all demo data?'))return;
        localStorage.removeItem(STORAGE_KEY);state=loadState();document.documentElement.setAttribute('data-theme',state.settings.theme);updatePendingBadge();navigate('settings');
      });
    }
  }
  renderSettings();
};

// ======== NAV WIRING ========
document.querySelectorAll('.nav-item').forEach(el=>{
  el.addEventListener('click',()=>{ if(el.dataset.page) navigate(el.dataset.page); });
});

// ======== INIT ========
document.getElementById('resetDemoBtn').addEventListener('click',()=>{
  if(!confirm('Reset all demo data?'))return;
  localStorage.removeItem(STORAGE_KEY);state=loadState();document.documentElement.setAttribute('data-theme',state.settings.theme);updatePendingBadge();navigate('dashboard');
});

updatePendingBadge();
navigate('dashboard');
</script>
</body>
</html>
