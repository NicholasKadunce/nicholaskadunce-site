<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpsIQ Dashboard &mdash; Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── Tokens ── */
:root{
  --bg:#F0F2F5;--surface:#FFFFFF;--ink:#0f172a;--ink-sec:#6E6E73;--ink-ter:#AEAEB2;
  --border:#D2D2D7;--border-light:#E5E5EA;
  --accent:#2251FF;--accent-dark:#1a3fcc;--accent-light:#2B5DA6;
  --navy:#051c2c;--navy-sidebar:#1B3D6E;--navy-dark:#122B52;
  --green:#10b981;--green-css:#34C759;--yellow:#f59e0b;--red:#ef4444;--red-css:#FF3B30;
  --gold:#F0A500;--gold-light:#FFD040;
  --blue-tint:#EBF1FA;--orange-tint:#FFF5EB;--red-tint:#FFF0F0;
  --radius-sm:8px;--radius-md:10px;--radius-lg:14px;--radius-xl:18px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);--shadow-lg:0 8px 24px rgba(0,0,0,0.12);
  --glass-bg:rgba(255,255,255,0.62);--glass-bg-hover:rgba(255,255,255,0.82);
  --glass-blur:saturate(180%) blur(22px);
  --glass-border:rgba(255,255,255,0.45);--glass-border-strong:rgba(255,255,255,0.65);
  --glass-shadow:0 1px 2px rgba(0,0,0,0.04),0 6px 18px rgba(0,0,0,0.06);
  --glass-shadow-hover:0 2px 4px rgba(0,0,0,0.06),0 12px 28px rgba(0,0,0,0.10);
  --trans:all .18s ease;
  --sidebar-w:60px;
}
[data-theme="dark"]{
  --bg:#0B1120;--surface:#141B2D;--ink:#E2E8F0;--ink-sec:#94A3B8;--ink-ter:#64748B;
  --border:#2D3748;--border-light:#1E293B;
  --blue-tint:rgba(27,61,110,0.2);--orange-tint:rgba(230,126,34,0.15);--red-tint:rgba(220,38,38,0.12);
  --glass-bg:rgba(255,255,255,0.055);--glass-bg-hover:rgba(255,255,255,0.12);
  --glass-border:rgba(255,255,255,0.08);--glass-border-strong:rgba(255,255,255,0.15);
}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink-sec);font-size:14px;line-height:1.5;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}

/* ── Demo banner ── */
.demo-banner{position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,var(--accent),#3d6aff);color:#fff;text-align:center;padding:5px 16px;font-size:11px;font-weight:600;z-index:300;letter-spacing:.3px}
.demo-banner button{margin-left:12px;background:rgba(255,255,255,.2);padding:2px 10px;border-radius:4px;font-size:10px;color:#fff;font-weight:600}

/* ── Sidebar (60px icon-only, navy) ── */
.sidebar{position:fixed;top:28px;left:0;bottom:0;width:var(--sidebar-w);background:linear-gradient(180deg,var(--navy-sidebar),var(--navy-dark));display:flex;flex-direction:column;align-items:center;z-index:200;box-shadow:2px 0 12px rgba(0,0,0,.12);padding:14px 0 16px}
[data-theme="dark"] .sidebar{background:linear-gradient(180deg,#070D1A,#0B1120)}
.sidebar-logo{cursor:pointer;margin-bottom:16px;flex-shrink:0;color:#fff;font-size:11px;font-weight:800;letter-spacing:1.5px;text-align:center;line-height:1.2;user-select:none;transition:transform .15s}
.sidebar-logo:hover{transform:scale(1.06);opacity:.85}
.sidebar-nav{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 8px}
.sidebar-btn{position:relative;width:44px;height:44px;border:none;background:transparent;color:rgba(255,255,255,.45);cursor:pointer;border-radius:12px;transition:var(--trans);display:flex;align-items:center;justify-content:center;padding:0}
.sidebar-btn svg{width:22px;height:22px;flex-shrink:0}
.sidebar-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.9)}
.sidebar-btn.active{background:rgba(255,255,255,.15);color:#fff}
.sidebar-btn.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:24px;background:var(--gold);border-radius:0 3px 3px 0}
.sidebar-badge{position:absolute;top:4px;right:4px;background:var(--red-css);color:#fff;font-size:8px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.sidebar-divider{width:28px;height:1px;background:rgba(255,255,255,.1);margin:6px 0;flex-shrink:0}
.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 8px}

/* ── Content ── */
.content{margin-left:var(--sidebar-w);flex:1;padding:20px 24px;min-width:0;padding-top:48px}
.app{display:flex;min-height:100vh}

/* ── Glass cards ── */
.glass{background:var(--glass-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);border-radius:var(--radius-lg)}
.card{background:var(--surface);border-radius:var(--radius-lg);padding:20px;border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);margin-bottom:16px;transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:var(--glass-border-strong);box-shadow:var(--glass-shadow-hover)}
[data-theme="dark"] .card{background:var(--surface);border-color:var(--border-light)}
.card-title{font-size:17px;font-weight:700;color:var(--navy-sidebar);margin-bottom:4px;letter-spacing:-.3px}
[data-theme="dark"] .card-title{color:var(--ink)}
.card-sub{font-size:12px;color:var(--ink-sec);margin-bottom:16px}
.chart-wrap{position:relative;height:240px}

/* ── Glass buttons ── */
.glass-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;min-height:36px;font-size:13px;font-weight:700;letter-spacing:.1px;color:var(--navy-sidebar);background:var(--glass-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:var(--radius-md);box-shadow:var(--glass-shadow);cursor:pointer;transition:var(--trans);white-space:nowrap}
.glass-btn:hover{background:var(--glass-bg-hover);border-color:var(--glass-border-strong);box-shadow:var(--glass-shadow-hover);transform:translateY(-1px)}
.glass-btn-sm{padding:6px 12px;min-height:30px;font-size:12px;border-radius:var(--radius-sm)}
.glass-btn-primary{color:#fff;background:linear-gradient(180deg,var(--accent-light),var(--navy-sidebar));border-color:rgba(255,255,255,.18);text-shadow:0 1px 1px rgba(0,0,0,.12)}
.glass-btn-danger{color:#fff;background:linear-gradient(180deg,#D9434A,#B02028);border-color:rgba(255,255,255,.18)}
[data-theme="dark"] .glass-btn{color:#E2E8F0}

/* ── Page headers ── */
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-title{font-size:22px;font-weight:800;color:var(--navy-sidebar);letter-spacing:-.5px}
[data-theme="dark"] .page-title{color:var(--ink)}
.page-subtitle{font-size:12px;color:var(--ink-sec);margin-top:2px;font-weight:500}

/* ── Filter bar (glass morphism) ── */
.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:20px;padding:10px 16px;background:var(--glass-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:var(--radius-lg);box-shadow:var(--glass-shadow)}
.filter-bar select,.filter-bar input[type="date"]{height:32px;padding:0 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-weight:600;background:var(--surface);color:var(--navy-sidebar);cursor:pointer}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--accent);outline:none}
.dash-shift-btn{height:28px;padding:0 12px;border:1.5px solid var(--border);border-radius:6px;font-size:11px;font-weight:700;background:var(--surface);color:var(--ink-sec);cursor:pointer;transition:var(--trans)}
.dash-shift-btn.active{background:var(--navy-sidebar);color:#fff;border-color:var(--navy-sidebar)}
.dash-preset-btn{height:28px;padding:0 10px;border:none;border-radius:6px;font-size:11px;font-weight:600;background:transparent;color:var(--ink-ter);cursor:pointer;transition:var(--trans)}
.dash-preset-btn:hover{color:var(--navy-sidebar)}
.dash-preset-btn.active{background:var(--navy-sidebar);color:#fff}

/* ── OEE Hero Cards ── */
.oee-hero-grid{display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.dash-oee-card{background:var(--surface);border-radius:var(--radius-lg);padding:16px 20px;text-align:center;border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);transition:var(--trans);cursor:default}
.dash-oee-card:hover{border-color:var(--glass-border-strong);box-shadow:var(--glass-shadow-hover)}
.dash-oee-card.oee-main{background:linear-gradient(168deg,#F8FAFF,#EBF1FA);border-color:rgba(34,81,255,.15);box-shadow:0 4px 20px rgba(34,81,255,.1)}
[data-theme="dark"] .dash-oee-card{background:linear-gradient(168deg,#141B2D,#0F172A);border-color:rgba(148,163,184,.12)}
[data-theme="dark"] .dash-oee-card.oee-main{background:linear-gradient(160deg,#1E293B,#141B2D);border-color:rgba(148,163,184,.15)}
.dash-oee-label{font-size:10px;font-weight:700;color:var(--ink-ter);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.dash-oee-value{font-size:36px;font-weight:900;color:var(--ink);letter-spacing:-1px;line-height:1.1}
.dash-oee-card.oee-main .dash-oee-value{font-size:48px}
.dash-oee-pct{font-size:18px;font-weight:400}
.dash-oee-delta{font-size:11px;font-weight:600;margin-top:4px}
.dash-oee-delta.up{color:var(--green-css)}
.dash-oee-delta.down{color:var(--red-css)}
.oee-sub-metrics{display:flex;justify-content:center;gap:16px;margin-top:8px;font-size:11px;font-weight:600;color:var(--ink-sec)}
.oee-sub-metrics span{display:flex;flex-direction:column;align-items:center;gap:1px}
.oee-sub-metrics .sub-val{font-size:14px;font-weight:800;color:var(--ink)}
.dash-oee-ring{position:relative;width:80px;height:80px;margin:0 auto 6px}
.dash-oee-ring canvas{width:80px!important;height:80px!important}
.dash-oee-ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:900;color:var(--ink)}

/* ── Chart grid ── */
.chart-row{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:16px}
.chart-row.full{grid-template-columns:1fr}

/* ── Tables (dash-table) ── */
.dash-table{width:100%;border-collapse:collapse;font-size:12px}
.dash-table th{text-align:left;padding:10px 12px;font-size:10px;color:var(--ink-sec);letter-spacing:.08em;text-transform:uppercase;font-weight:700;border-bottom:2px solid var(--border);background:var(--bg)}
[data-theme="dark"] .dash-table th{background:#0F172A;color:var(--ink);border-color:var(--border)}
.dash-table td{padding:10px 12px;border-bottom:1px solid var(--border-light);color:var(--ink-sec)}
[data-theme="dark"] .dash-table td{border-color:var(--border-light)}
.dash-table tr:last-child td{border-bottom:none}
.dash-table tr:hover td{background:var(--blue-tint)}
[data-theme="dark"] .dash-table tr:hover td{background:rgba(27,61,110,.15)}
.dash-oee-good{background:rgba(52,199,89,.1);color:#16a34a;font-weight:700;border-radius:4px;padding:3px 8px;display:inline-block}
.dash-oee-warn{background:rgba(245,158,11,.1);color:#d97706;font-weight:700;border-radius:4px;padding:3px 8px;display:inline-block}
.dash-oee-bad{background:rgba(239,68,68,.1);color:#dc2626;font-weight:700;border-radius:4px;padding:3px 8px;display:inline-block}
.dash-constraint{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block}
.dash-constraint.loss-a{background:rgba(239,68,68,.1);color:#dc2626}
.dash-constraint.loss-p{background:rgba(245,158,11,.1);color:#d97706}
.dash-constraint.loss-q{background:rgba(139,92,246,.1);color:#7c3aed}

/* ── Machine status grid ── */
.machines-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.machine{padding:12px;border:1px solid var(--border-light);border-radius:var(--radius-md);background:var(--surface);transition:var(--trans)}
.machine:hover{border-color:var(--accent);box-shadow:var(--shadow-sm)}
.machine-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.machine-dot.running{background:var(--green-css);box-shadow:0 0 0 3px rgba(52,199,89,.15)}
.machine-dot.down{background:var(--red-css);box-shadow:0 0 0 3px rgba(255,59,48,.15)}
.machine-dot.idle{background:var(--yellow);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
.machine-name{font-size:12px;font-weight:700;color:var(--ink)}
.machine-stat{font-size:10px;color:var(--ink-ter);margin-top:4px;letter-spacing:.3px}
.machine-oee{font-size:16px;font-weight:800;color:var(--ink);margin-top:6px}

/* ── Sub-tabs ── */
.sub-tabs{display:flex;gap:0;border-bottom:2px solid var(--border-light);margin-bottom:20px;overflow-x:auto}
.sub-tab{padding:8px 16px;font-size:12px;font-weight:600;color:var(--ink-ter);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:var(--trans);white-space:nowrap}
.sub-tab:hover{color:var(--ink)}
.sub-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}

/* ── DT classification ── */
.dt-select{padding:6px 8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--ink);font-size:12px;font-family:inherit;width:100%;max-width:200px}
.dt-btn{padding:6px 14px;background:linear-gradient(180deg,var(--accent-light),var(--navy-sidebar));color:#fff;border-radius:var(--radius-sm);font-size:11px;font-weight:700;border:none;cursor:pointer}
.dt-btn:disabled{opacity:.4;cursor:not-allowed}
.dt-badge{display:inline-block;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.3px}
.dt-badge.pending{background:rgba(245,158,11,.15);color:#b45309}
.dt-badge.classified{background:rgba(16,185,129,.15);color:#047857}

/* ── Six Sigma tools grid ── */
.tools-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.tool-card{background:var(--surface);border:1px solid var(--glass-border);padding:20px;border-radius:var(--radius-lg);cursor:pointer;transition:var(--trans);box-shadow:var(--glass-shadow)}
.tool-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:var(--glass-shadow-hover)}
.tool-icon{width:40px;height:40px;border-radius:var(--radius-md);background:var(--blue-tint);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.tool-title{font-size:14px;font-weight:700;color:var(--ink)}
.tool-desc{font-size:12px;color:var(--ink-sec);margin-top:6px;line-height:1.5}

/* ── Settings ── */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border-light)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:13px;font-weight:600;color:var(--ink)}
.setting-desc{font-size:11px;color:var(--ink-sec);margin-top:2px}
.switch{position:relative;width:36px;height:20px;background:var(--border);border-radius:10px;cursor:pointer;transition:background .2s}
.switch.on{background:var(--accent)}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}
.switch.on::after{transform:translateX(16px)}
.inline-form{display:flex;gap:8px;align-items:center;padding:10px 0;flex-wrap:wrap}
.inline-form input,.inline-form select{flex:1;min-width:100px;height:36px;padding:0 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--ink)}

/* ── TV Display ── */
.tv-display{max-width:1920px;margin:0 auto;display:flex;flex-direction:column;min-height:calc(100vh - 80px)}
.tv-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0;flex-wrap:wrap;gap:8px;flex-shrink:0}
.tv-header-title{font-size:18px;font-weight:800;color:var(--navy-sidebar);letter-spacing:-.5px}
[data-theme="dark"] .tv-header-title{color:var(--ink)}
.tv-header-sub{font-size:11px;color:var(--ink-sec);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.tv-header-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tv-range-group{display:flex;gap:2px;background:var(--bg);border-radius:var(--radius-sm);padding:2px}
.tv-range-btn{height:26px;padding:0 10px;border:none;border-radius:4px;font-size:10px;font-weight:700;background:transparent;color:var(--ink-ter);cursor:pointer;transition:var(--trans)}
.tv-range-btn:hover{color:var(--navy-sidebar)}
.tv-range-btn.active{background:var(--navy-sidebar);color:#fff}
.tv-grid{display:grid;gap:8px;flex:1;min-height:0}
.tv-equip-card{background:var(--surface);border-radius:10px;box-shadow:var(--shadow-sm);overflow:hidden;display:flex;flex-direction:column}
[data-theme="dark"] .tv-equip-card{background:var(--surface);border:1px solid var(--border-light)}
.tv-equip-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:linear-gradient(135deg,var(--navy-sidebar),#2A5199);color:#fff;flex-wrap:nowrap;gap:8px;flex-shrink:0}
.tv-equip-name{display:flex;flex-direction:column;gap:1px;min-width:0;flex-shrink:1}
.tv-equip-title{font-size:14px;font-weight:700;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tv-equip-product{font-size:9px;opacity:.7;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tv-equip-operators{font-size:8px;font-weight:600;color:#bfd4f5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.tv-oee-pills{display:flex;gap:5px;flex-shrink:0;align-items:center}
.tv-oee-pill{background:#fff;border-radius:6px;padding:2px 6px;text-align:center;min-width:40px;border-left:3px solid;box-shadow:0 1px 3px rgba(0,0,0,.08)}
[data-theme="dark"] .tv-oee-pill{background:var(--surface);border-color:var(--border)}
.tv-oee-pill-val{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.tv-oee-pill-label{font-size:6px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px}
.tv-oee-pill.oee-hero{padding:4px 10px;min-width:56px;border-left-width:4px;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.tv-oee-pill.oee-hero .tv-oee-pill-val{font-size:18px;font-weight:900;letter-spacing:-.5px}
.tv-oee-pill.oee-hero .tv-oee-pill-label{font-size:7px}
.tv-summary-row{display:flex;gap:1px;background:var(--border-light);flex-shrink:0}
.tv-summary-stat{flex:1;text-align:center;padding:6px 4px;background:var(--surface)}
.tv-summary-val{display:block;font-size:14px;font-weight:800;color:var(--navy-sidebar);font-variant-numeric:tabular-nums}
[data-theme="dark"] .tv-summary-val{color:var(--ink)}
.tv-summary-label{display:block;font-size:8px;font-weight:600;color:var(--ink-ter);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.tv-content-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border-light);flex:1;min-height:0}
.tv-section{padding:4px 8px;background:var(--surface);display:flex;flex-direction:column;min-height:0}
.tv-section-title{font-size:9px;font-weight:700;color:var(--navy-sidebar);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;flex-shrink:0}
[data-theme="dark"] .tv-section-title{color:var(--ink)}
.tv-bar-row{display:flex;align-items:center;gap:4px;margin-bottom:2px}
.tv-bar-label{font-size:8px;font-weight:600;color:#64748B;width:36px;text-align:right;flex-shrink:0}
.tv-bar-track{flex:1;height:14px;background:#F1F5F9;border-radius:3px;position:relative;overflow:hidden}
[data-theme="dark"] .tv-bar-track{background:rgba(255,255,255,.08)}
.tv-bar-fill{height:100%;border-radius:3px;position:relative;min-width:1px}
.tv-bar-val{position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:8px;font-weight:700;color:#fff}

.team-break-emoji{font-size:64px;margin-bottom:16px}
.team-break-title{font-size:36px;font-weight:900;letter-spacing:1px;margin-bottom:8px}

/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:center;justify-content:center;z-index:250;padding:20px;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}

.modal{background:var(--surface);border-radius:var(--radius-xl);width:100%;max-width:620px;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:var(--shadow-lg);border:1px solid var(--glass-border)}

.modal-sub{font-size:12px;color:var(--ink-sec);margin-bottom:16px}

.fishbone{display:grid;grid-template-columns:1fr 1fr;gap:12px}

pageRenderers.classify=(main)=>{
  function render(){
    const pending=state.downtimeEvents.filter(e=>e.status==='pending');
    const classified=state.downtimeEvents.filter(e=>e.status==='classified');
    main.innerHTML=`<div class="page-header"><div><div class="page-title">Classify Downtime</div><div class="page-subtitle">${pending.length} events awaiting classification</div></div></div>
      ${pending.length?`<div class="card"><div class="card-title">Pending Events</div><div class="card-sub">Automated feed &mdash; classify each event</div>
        <table class="dash-table"><thead><tr><th>Machine</th><th>Start</th><th>Duration</th><th>Note</th><th>Category</th><th>Sub-item</th><th></th></tr></thead><tbody>
        ${pending.map(e=>`<tr data-id="${e.id}"><td style="font-weight:700;color:var(--ink)">${e.machine}</td><td>${e.start}</td><td>${e.duration} min</td><td style="max-width:180px">${e.note}</td>
          <td><select class="dt-select cat-sel"><option value="">Select&hellip;</option>${DT_CATEGORIES.map(c=>'<option>'+c+'</option>').join('')}</select></td>
          <td><select class="dt-select sub-sel" disabled><option value="">--</option></select></td>
          <td><button class="dt-btn classify-btn" disabled>Classify</button></td></tr>`).join('')}</tbody></table></div>`
      :'<div class="card" style="text-align:center;padding:40px;color:var(--ink-sec)">All events classified!</div>'}
      <div class="card"><div class="card-title">Recently Classified</div><div class="card-sub">${classified.length} events</div>
        ${classified.length?`<table class="dash-table"><thead><tr><th>Machine</th><th>Start</th><th>Duration</th><th>Category</th><th>Note</th></tr></thead><tbody>
        ${classified.map(e=>'<tr><td style="font-weight:700;color:var(--ink)">'+e.machine+'</td><td>'+e.start+'</td><td>'+e.duration+' min</td><td><span class="dt-badge classified">'+e.category+'</span></td><td>'+e.note+'</td></tr>').join('')}</tbody></table>`
        :'<div style="padding:20px;text-align:center;color:var(--ink-ter);font-size:12px">No classified events yet</div>'}</div>`;
    main.querySelectorAll('.cat-sel').forEach(sel=>{sel.addEventListener('change',function(){const row=this.closest('tr'),sub=row.querySelector('.sub-sel'),btn=row.querySelector('.classify-btn');if(this.value){const items=DT_SUBITEMS[this.value]||['N/A'];sub.innerHTML=items.map(s=>'<option>'+s+'</option>').join('');sub.disabled=false;btn.disabled=false;}else{sub.innerHTML='<option>--</option>';sub.disabled=true;btn.disabled=true;}});});
    main.querySelectorAll('.classify-btn').forEach(btn=>{btn.addEventListener('click',function(){const row=this.closest('tr'),id=row.dataset.id,cat=row.querySelector('.cat-sel').value;const ev=state.downtimeEvents.find(e=>e.id===id);if(ev){ev.status='classified';ev.category=cat;saveState();updatePendingBadge();render();}});});
  }
  render();
};
function updatePendingBadge(){const c=state.downtimeEvents.filter(e=>e.status==='pending').length;const b=document.getElementById('pendingBadge');b.textContent=c;b.style.display=c?'':'none';}

function openTool(id){

  else if(id==='pcslabor'){openModal('<div class="modal-title">Pcs / Labor Hour</div><div class="modal-sub">By shift</div><div style="height:280px;position:relative"><canvas id="mC"></canvas></div>');window._mc=new Chart(document.getElementById('mC'),{type:'bar',data:{labels:['Shift 1','Shift 2','Shift 3'],datasets:[{data:[18.4,15.2,16.8],backgroundColor:['#2251FF','#3d6aff','#6b8fff'],borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:d.tt},scales:{x:{grid:{display:false},ticks:{color:d.tick}},y:{grid:{color:d.grid},ticks:{color:d.tick},title:{display:true,text:'Pcs/Labor Hr',color:d.tick}}}}});}
  else if(id==='yamazumi'){openModal('<div class="modal-title">Yamazumi Chart</div><div class="modal-sub">Work element breakdown by equipment</div><div style="height:300px;position:relative"><canvas id="mC"></canvas></div>');window._mc=new Chart(document.getElementById('mC'),{type:'bar',data:{labels:['Autoshear #1','400 Press','Header #1','Threader #1'],datasets:[{label:'Value-add',data:[22,25,18,20],backgroundColor:'#2251FF'},{label:'Setup',data:[5,8,4,6],backgroundColor:'#f59e0b'},{label:'Wait',data:[3,6,2,4],backgroundColor:'#FF3B30'},{label:'Transport',data:[2,3,1,2],backgroundColor:'#94A3B8'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10},color:d.tick}},tooltip:d.tt},scales:{x:{stacked:true,grid:{display:false},ticks:{color:d.tick}},y:{stacked:true,grid:{color:d.grid},ticks:{color:d.tick},title:{display:true,text:'Seconds',color:d.tick}}}}});}
  else if(id==='pareto'){const total=DT_PARETO.data.reduce((a,b)=>a+b,0);let cum=0;const cumPct=DT_PARETO.data.map(v=>{cum+=v;return Math.round(cum/total*100);});openModal('<div class="modal-title">Pareto Analysis &mdash; Downtime</div><div class="modal-sub">This shift &middot; minutes by category</div><div style="height:280px;position:relative"><canvas id="mC"></canvas></div><div style="margin-top:14px;font-size:12px;color:var(--ink-sec)"><strong>Vital few:</strong> Tooling + Material = '+(DT_PARETO.data[0]+DT_PARETO.data[1])+' min ('+Math.round((DT_PARETO.data[0]+DT_PARETO.data[1])/total*100)+'% of total).</div>');window._mc=new Chart(document.getElementById('mC'),{data:{labels:DT_PARETO.labels,datasets:[{type:'bar',label:'Minutes',data:DT_PARETO.data,backgroundColor:'#2251FF',borderRadius:2,order:2},{type:'line',label:'Cumulative %',data:cumPct,borderColor:'#FF3B30',pointBackgroundColor:'#FF3B30',yAxisID:'y2',tension:.2,order:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10},color:d.tick}},tooltip:d.tt},scales:{x:{grid:{display:false},ticks:{color:d.tick,font:{size:10}}},y:{grid:{color:d.grid},ticks:{color:d.tick},title:{display:true,text:'Minutes',color:d.tick}},y2:{position:'right',min:0,max:100,grid:{display:false},ticks:{color:d.tick,callback:v=>v+'%'}}}}});}
  else if(id==='fishbone'){openModal('<div class="modal-title">Ishikawa / Fishbone &mdash; 400 Press Downtime</div><div class="modal-sub">Problem: Hydraulic pressure drop (18 min)</div><div class="fishbone"><div class="fishbone-group"><div class="fishbone-title">Machine</div><ul><li>Hydraulic pump wear (18 mo)</li><li>Seal degradation</li><li>Filter restriction</li></ul></div><div class="fishbone-group"><div class="fishbone-title">Method</div><ul><li>No vibration-trend baseline</li><li>PM interval not risk-adjusted</li></ul></div><div class="fishbone-group"><div class="fishbone-title">Material</div><ul><li>Hydraulic fluid viscosity</li><li>Contamination from supplier batch</li></ul></div><div class="fishbone-group"><div class="fishbone-title">Man</div><ul><li>Pre-shift inspection missed</li><li>Operator training on early warnings</li></ul></div><div class="fishbone-group"><div class="fishbone-title">Measurement</div><ul><li>Pressure sensor calibration 90 days out</li></ul></div><div class="fishbone-group"><div class="fishbone-title">Environment</div><ul><li>Ambient temperature swing</li><li>Debris near intake</li></ul></div></div>');}
  else if(id==='whys'){openModal('<div class="modal-title">5 Whys &mdash; Threader #1 Vibration</div><div class="modal-sub">Based on event dt-005</div><div class="whys-row"><div class="whys-label">Problem</div><div class="whys-text">Threader #1 flagged intermittent vibration spikes, causing a 12-min stop.</div></div><div class="whys-row"><div class="whys-label">Why 1?</div><div class="whys-text">Vibration exceeded the 4.2 mm/s control limit on bearing #2.</div></div><div class="whys-row"><div class="whys-label">Why 2?</div><div class="whys-text">Bearing clearance increased beyond spec.</div></div><div class="whys-row"><div class="whys-label">Why 3?</div><div class="whys-text">Lubrication interval was extended during a staffing crunch.</div></div><div class="whys-row"><div class="whys-label">Why 4?</div><div class="whys-text">PM schedule was manual and drifted under production pressure.</div></div><div class="whys-row"><div class="whys-label">Why 5? (Root)</div><div class="whys-text"><strong>CMMS-triggered auto-PM was never configured for threader bearings.</strong></div></div><div style="margin-top:16px;padding:12px;background:var(--blue-tint);border-radius:var(--radius-md);font-size:12px"><strong>Countermeasure:</strong> Enable auto-PM in CMMS for all threader bearings with a 500-hour lube cycle; add vibration-trend alert.</div>');}
  else if(id==='control'){openModal('<div class="modal-title">Control Chart &mdash; Press Cycle Time</div><div class="modal-sub">I-chart &middot; Target 35s &middot; UCL 42s &middot; LCL 28s</div><div style="height:300px;position:relative"><canvas id="mC"></canvas></div>');const spc=genSPCData(),ooc=spc.points.map(p=>p.y>spc.ucl||p.y<spc.lcl);window._mc=new Chart(document.getElementById('mC'),{type:'line',data:{labels:spc.points.map((_,i)=>i+1),datasets:[{label:'Cycle',data:spc.points.map(p=>p.y),borderColor:'#2251FF',pointBackgroundColor:ooc.map(o=>o?'#FF3B30':'#2251FF'),pointRadius:3,tension:.1,fill:false},{label:'Target',data:new Array(spc.points.length).fill(spc.target),borderColor:'#051c2c',borderDash:[4,4],pointRadius:0,fill:false},{label:'UCL',data:new Array(spc.points.length).fill(spc.ucl),borderColor:'#FF3B30',borderDash:[3,3],pointRadius:0,fill:false},{label:'LCL',data:new Array(spc.points.length).fill(spc.lcl),borderColor:'#FF3B30',borderDash:[3,3],pointRadius:0,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10},color:d.tick}},tooltip:d.tt},scales:{x:{grid:{display:false},ticks:{color:d.tick,maxTicksLimit:10}},y:{min:20,max:50,grid:{color:d.grid},ticks:{color:d.tick}}}}});}
  else if(id==='dmaic'){const prj=[{name:'Reduce 400 Press unplanned downtime',phase:'Analyze',pct:45},{name:'Threader vibration predictive PM',phase:'Improve',pct:72},{name:'Shear blade-change standard work',phase:'Control',pct:95},{name:'Thread-defect root cause (Assembly)',phase:'Measure',pct:22},{name:'Shift handoff cadence redesign',phase:'Define',pct:8}];openModal('<div class="modal-title">DMAIC Tracker</div><div class="modal-sub">'+prj.length+' active projects</div><table class="dash-table"><thead><tr><th>Project</th><th>Phase</th><th>Progress</th></tr></thead><tbody>'+prj.map(p=>'<tr><td style="font-weight:600;color:var(--ink)">'+p.name+'</td><td><span class="dt-badge classified">'+p.phase+'</span></td><td style="width:180px"><div style="background:var(--border-light);border-radius:4px;height:8px"><div style="background:var(--accent);width:'+p.pct+'%;height:100%;border-radius:4px"></div></div><div style="font-size:10px;color:var(--ink-ter);margin-top:3px">'+p.pct+'%</div></td></tr>').join('')+'</tbody></table>');}
  else if(id==='fmea'){const rows=[{mode:'Hydraulic seal failure (400 Press)',s:8,o:5,d:4},{mode:'Bearing wear (Threader #1)',s:7,o:6,d:5},{mode:'Blade dull (Autoshear #1)',s:6,o:7,d:3},{mode:'Thread gauge drift (Assembly)',s:9,o:3,d:6},{mode:'Sensor calibration drift',s:5,o:4,d:7}].map(r=>({...r,rpn:r.s*r.o*r.d})).sort((a,b)=>b.rpn-a.rpn);openModal('<div class="modal-title">FMEA &mdash; Critical Assets</div><div class="modal-sub">RPN = Severity &times; Occurrence &times; Detection</div><table class="dash-table"><thead><tr><th>Failure Mode</th><th>S</th><th>O</th><th>D</th><th>RPN</th></tr></thead><tbody>'+rows.map(r=>'<tr><td style="color:var(--ink)">'+r.mode+'</td><td>'+r.s+'</td><td>'+r.o+'</td><td>'+r.d+'</td><td style="font-weight:800;color:'+(r.rpn>150?'var(--red-css)':r.rpn>80?'var(--yellow)':'var(--green-css)')+'">'+r.rpn+'</td></tr>').join('')+'</tbody></table>');}
}

            <div class="tv-range-group"><button class="tv-range-btn active">Today</button><button class="tv-range-btn">Yesterday</button><button class="tv-range-btn">WTD</button><button class="tv-range-btn">MTD</button></div>

        <div class="tv-grid" style="grid-template-columns:repeat(${cols},1fr)">

                  <div class="tv-oee-pill" style="border-color:${pillColor(m.perf)}"><div class="tv-oee-pill-val">${m.perf.toFixed(0)}%</div><div class="tv-oee-pill-label">P</div></div>
                  <div class="tv-oee-pill" style="border-color:${pillColor(m.qual)}"><div class="tv-oee-pill-val">${m.qual.toFixed(0)}%</div><div class="tv-oee-pill-label">Q</div></div>
                </div>
              </div>
              <div class="tv-summary-row">
                <div class="tv-summary-stat"><span class="tv-summary-val">${m.actual}</span><span class="tv-summary-label">Good</span></div>
                <div class="tv-summary-stat"><span class="tv-summary-val">${m.target}</span><span class="tv-summary-label">Target</span></div>

              </div>
              <div class="tv-content-grid">
                <div class="tv-section"><div class="tv-section-title">Hourly Output</div>
                  ${HOURLY_LABELS.map((l,i)=>{const v=hrData[i];const pct=Math.min(v/m.target*100*8,100);const cl=v>=m.target/8?'var(--green-css)':'var(--red-css)';
                    return'<div class="tv-bar-row"><div class="tv-bar-label">'+l.split(' ')[0]+'</div><div class="tv-bar-track"><div class="tv-bar-fill" style="width:'+pct+'%;background:'+cl+'"><div class="tv-bar-val">'+v+'</div></div></div></div>';}).join('')}
                </div>
                <div class="tv-section"><div class="tv-section-title">Top Downtime</div>

                  <div class="tv-section-title" style="margin-top:8px">Top Defects</div>
                  ${['Bent Bar','Burr'].map((c,i)=>{const v=[3,1][i];const pct=v/5*100;return'<div class="tv-bar-row"><div class="tv-bar-label" style="width:60px">'+c+'</div><div class="tv-bar-track"><div class="tv-bar-fill" style="width:'+pct+'%;background:var(--yellow)"><div class="tv-bar-val">'+v+'</div></div></div></div>';}).join('')}

      box.innerHTML=`<div class="card"><div class="card-title">Downtime Codes</div><div class="card-sub">${DT_CATEGORIES.length} codes configured</div>
        <table class="dash-table"><thead><tr><th>#</th><th>Code Name</th><th>Sub-items</th></tr></thead><tbody>
        ${DT_CATEGORIES.map((c,i)=>'<tr><td style="font-weight:700;color:var(--ink)">'+(i+1)+'</td><td>'+c+'</td><td style="font-size:11px;color:var(--ink-ter)">'+(DT_SUBITEMS[c]?DT_SUBITEMS[c].join(', '):'&mdash;')+'</td></tr>').join('')}</tbody></table></div>`;
    } else if(activeStab==='Rates'){
      box.innerHTML=`<div class="card"><div class="card-title">Target Rates</div><div class="card-sub">Units per hour by equipment</div>
        <table class="dash-table"><thead><tr><th>Equipment</th><th>Target (units/hr)</th></tr></thead><tbody>
        ${state.rates.map((r,i)=>'<tr><td style="font-weight:700;color:var(--ink)">'+r.equip+'</td><td><input type="number" value="'+r.target+'" min="1" style="width:80px;height:32px;padding:0 8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:700;background:var(--surface);color:var(--ink)" data-ri="'+i+'"></td></tr>').join('')}</tbody></table></div>`;
      box.querySelectorAll('input[data-ri]').forEach(inp=>{inp.addEventListener('change',()=>{state.rates[+inp.dataset.ri].target=+inp.value;saveState();});});
    } else if(activeStab==='Alerts'){
      box.innerHTML=`<div class="card"><div class="card-title">Alerts</div><div class="card-sub">Automated notifications</div>
        <div class="setting-row"><div><div class="setting-label">Daily email digest</div><div class="setting-desc">06:15 local time</div></div><div class="switch ${s.emailDigest?'on':''}" data-toggle="emailDigest"></div></div>
        <div class="setting-row"><div><div class="setting-label">Slack OEE alerts</div><div class="setting-desc">Ping #ops when OEE drops below threshold</div></div><div class="switch ${s.slackAlerts?'on':''}" data-toggle="slackAlerts"></div></div>
        <div class="setting-row"><div><div class="setting-label">High-downtime alert</div><div class="setting-desc">When a single event exceeds 15 min</div></div><div class="switch ${s.alertHighDowntime?'on':''}" data-toggle="alertHighDowntime"></div></div>
        <div class="setting-row"><div><div class="setting-label">OEE threshold</div><div class="setting-desc">Notify when plant OEE drops below</div></div><input type="number" id="setOee" min="50" max="100" value="${s.oeeThreshold}" style="width:80px;height:32px"></div></div>`;
      box.querySelectorAll('[data-toggle]').forEach(el=>{el.addEventListener('click',()=>{const k=el.dataset.toggle;state.settings[k]=!state.settings[k];el.classList.toggle('on',state.settings[k]);saveState();});});
      const oeeInp=box.querySelector('#setOee');if(oeeInp)oeeInp.addEventListener('change',e=>{state.settings.oeeThreshold=+e.target.value;saveState();});
    } else if(activeStab==='Display'){
      box.innerHTML=`<div class="card"><div class="card-title">Display</div><div class="card-sub">Appearance</div>
        <div class="setting-row"><div><div class="setting-label">Theme</div><div class="setting-desc">Light or dark mode</div></div>
          <select id="setTheme"><option value="light" ${s.theme==='light'?'selected':''}>Light</option><option value="dark" ${s.theme==='dark'?'selected':''}>Dark</option></select></div></div>`;
      box.querySelector('#setTheme').addEventListener('change',e=>{state.settings.theme=e.target.value;document.documentElement.setAttribute('data-theme',e.target.value);saveState();navigate('settings');});
    } else if(activeStab==='Data'){
      box.innerHTML=`<div class="card"><div class="card-title">Data</div><div class="card-sub">All data is dummy; no remote backend</div>
        <div class="setting-row"><div><div class="setting-label">Reset demo to defaults</div><div class="setting-desc">Clears all classifications and restores pending events</div></div>
          <button class="glass-btn glass-btn-danger glass-btn-sm" id="setReset">Reset</button></div></div>`;
      box.querySelector('#setReset').addEventListener('click',()=>{if(!confirm('Reset all demo data?'))return;localStorage.removeItem(STORAGE_KEY);state=loadState();document.documentElement.setAttribute('data-theme',state.settings.theme);updatePendingBadge();navigate('settings');});
    }
  }
  render();
};

// ════════════════════════════════════════
// NAV WIRING + INIT
// ════════════════════════════════════════
document.querySelectorAll('.sidebar-btn,.sidebar-logo').forEach(el=>{el.addEventListener('click',()=>{if(el.dataset.page)navigate(el.dataset.page);});});
document.getElementById('resetDemoBtn').addEventListener('click',()=>{if(!confirm('Reset all demo data?'))return;localStorage.removeItem(STORAGE_KEY);state=loadState();document.documentElement.setAttribute('data-theme',state.settings.theme);updatePendingBadge();navigate('dashboard');});

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

updatePendingBadge();
navigate('dashboard');
</script>
</body>
</html>
